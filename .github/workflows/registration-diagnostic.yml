name: Registration Test Diagnostics

on:
  pull_request:
    paths:
      - "cards/**"
      - "config/**"
      - "templates/**"
      - ".github/workflows/registration-diagnostic.yml"

permissions:
  contents: read

jobs:
  registration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Django tests and preserve output
        id: tests
        continue-on-error: true
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"
        run: |
          python manage.py migrate --noinput
          python manage.py test -v 2 > registration-test.log 2>&1
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registration-test-log
          path: registration-test.log
          if-no-files-found: error
      - name: Fail when tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1
