name: Diagnose Payment UI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: diagnostic-only
      DJANGO_DEBUG: "1"
      DJANGO_SECURE_COOKIES: "0"
      DEFAULT_BUSINESS_SLUG: shisha-bar
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-email-navigation-payments-ui
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Tests ausführen
        id: tests
        continue-on-error: true
        run: |
          set +e
          python manage.py test -v 2 > "$RUNNER_TEMP/tests.log" 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 500 "$RUNNER_TEMP/tests.log" > "$RUNNER_TEMP/report.txt"
          exit 0
      - name: Diagnose veröffentlichen
        uses: actions/github-script@v7
        env:
          REPORT_FILE: ${{ runner.temp }}/report.txt
          EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync(process.env.REPORT_FILE, 'utf8').slice(0, 55000);
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 30,
              body: `# Diagnose PR #29\n\nExit-Code: ${process.env.EXIT_CODE}\n\n\`\`\`text\n${report}\n\`\`\``,
            });
