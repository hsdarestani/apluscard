name: Diagnose Apple Login Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --noinput
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"
      - name: Tests mit vollständiger Ausgabe
        id: tests
        shell: bash
        run: |
          set +e
          python manage.py test -v 2 > test-output.txt 2>&1
          STATUS=$?
          cat test-output.txt
          echo "$STATUS" > test-status.txt
          exit "$STATUS"
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"
      - name: Testausgabe speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apple-login-test-output
          path: |
            test-output.txt
            test-status.txt
          retention-days: 1
