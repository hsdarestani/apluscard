name: Temporäre vollständige Prüfung

on:
  push:
    branches: [agent/full-audit-hardening]

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: 91.107.145.196
      SSH_PORT: "22"
      SSH_USER: root
      APP_DIR: /root/apluscard
      SSHPASS: ${{ secrets.HETZNER_PASSWORD }}
    steps:
      - name: SSH-Werkzeuge installieren
        run: |
          sudo apt-get update >/dev/null
          sudo apt-get install -y sshpass >/dev/null
      - name: Host-Schlüssel laden
        run: |
          install -m 700 -d ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Produktion und Quellcode prüfen
        run: |
          set -Eeuo pipefail
          REPORT="$RUNNER_TEMP/audit.txt"
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cd '$APP_DIR' && docker compose exec -T web python -" > "$REPORT" 2>&1 <<'PY'
          import ast
          import os
          from pathlib import Path

          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "config.settings")
          import django
          django.setup()

          from django.conf import settings
          from django.test import Client
          from django.urls import get_resolver, resolve, reverse

          root = Path('/app')
          print('=== DJANGO ===')
          print('DEBUG:', settings.DEBUG)
          print('SESSION_COOKIE_SECURE:', settings.SESSION_COOKIE_SECURE)
          print('SESSION_COOKIE_SAMESITE:', settings.SESSION_COOKIE_SAMESITE)
          print('CSRF_COOKIE_SECURE:', settings.CSRF_COOKIE_SECURE)
          print('CSRF_COOKIE_SAMESITE:', settings.CSRF_COOKIE_SAMESITE)
          print('APPLE_LOGIN_ENABLED:', settings.APPLE_LOGIN_ENABLED)
          print('APPLE_REDIRECT_URI:', settings.APPLE_REDIRECT_URI)

          print('\n=== APPLE CALLBACK ===')
          callback = resolve('/accounts/apple/callback/').func
          print('callback_name:', getattr(callback, '__name__', type(callback).__name__))
          print('csrf_exempt:', bool(getattr(callback, 'csrf_exempt', False)))
          client = Client(enforce_csrf_checks=True, raise_request_exception=False)
          response = client.post('/accounts/apple/callback/', {}, HTTP_HOST='cards.smarbiz.sbs', HTTP_X_FORWARDED_PROTO='https', secure=True)
          print('cross_site_style_empty_post_status:', response.status_code)

          print('\n=== SELECT FOR UPDATE ===')
          for path in sorted((root / 'cards').rglob('*.py')):
              text = path.read_text(encoding='utf-8')
              for number, line in enumerate(text.splitlines(), 1):
                  if 'select_for_update' in line:
                      print(f'{path.relative_to(root)}:{number}: {line.strip()}')

          print('\n=== ROUTES ===')
          def walk(patterns, prefix=''):
              for item in patterns:
                  if hasattr(item, 'url_patterns'):
                      yield from walk(item.url_patterns, prefix + str(item.pattern))
                  else:
                      yield prefix + str(item.pattern), item.name
          for route, name in sorted(walk(get_resolver().url_patterns)):
              if route.startswith(('manager/', 'staff/', 'customer/', 'accounts/apple')):
                  print(route, name)

          print('\n=== AST WRITE-VIEW HEURISTIC ===')
          for path in sorted((root / 'cards').glob('*views.py')):
              tree = ast.parse(path.read_text(encoding='utf-8'))
              for node in tree.body:
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      source = ast.get_source_segment(path.read_text(encoding='utf-8'), node) or ''
                      writes = any(token in source for token in ('.save(', '.create(', '.update(', '.delete(', 'post_wallet_entry(', 'finalize_payment_request('))
                      if writes:
                          decorators = [ast.unparse(d) for d in node.decorator_list]
                          print(f'{path.name}:{node.lineno}:{node.name}: decorators={decorators}')
          PY

          {
            echo
            echo '=== LETZTE HTTP-FEHLER ==='
            sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cd '$APP_DIR' && docker compose logs --since 72h --tail=5000 web 2>&1" \
              | grep -E ' (403|500) |Forbidden|CSRF|Traceback|Internal Server Error|accounts/apple' \
              | tail -n 240 || true
          } >> "$REPORT"

          sed -E -i 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/[EMAIL]/g; s/[0-9a-fA-F]{8}-[0-9a-fA-F-]{27,36}/[UUID]/g; s/(sessionid|csrftoken)=[^ ;]+/\1=[REDACTED]/g; s/(password|secret|token)=([^ ,;]+)/\1=[REDACTED]/Ig' "$REPORT"
          echo "AUDIT_FILE=$REPORT" >> "$GITHUB_ENV"
      - name: Bericht veröffentlichen
        uses: actions/github-script@v7
        env:
          AUDIT_FILE: ${{ env.AUDIT_FILE }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync(process.env.AUDIT_FILE, 'utf8').slice(0, 30000);
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 16,
              body: `# Vollständige Produktionsprüfung\n\nStand: ${new Date().toISOString()}\n\n\`\`\`text\n${report}\n\`\`\`\n\nAlle personenbezogenen Daten, Cookies und Token wurden redigiert.`,
            });
