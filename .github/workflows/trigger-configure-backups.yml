name: Trigger Production Backup Setup

on:
  push:
    paths:
      - .github/workflows/trigger-configure-backups.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Backup-Konfiguration starten
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run configure-production-backups.yml --ref main

# Initial activation trigger for the encrypted Google Drive backup.
