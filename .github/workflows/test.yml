name: Test and Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: apluscard-production
  cancel-in-progress: false

jobs:
  django:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --noinput
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"
      - run: python manage.py test
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"

  deploy:
    name: Deploy to Hetzner
    needs: django
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: 91.107.145.196
      SSH_PORT: "22"
      SSH_USER: root
      APP_DIR: /root/apluscard
      SSHPASS: ${{ secrets.HETZNER_PASSWORD }}

    steps:
      - name: Validate deployment secret
        run: |
          set -eu
          test -n "$SSHPASS" || (echo "HETZNER_PASSWORD is missing" && exit 1)

      - name: Install SSH password client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Trust Hetzner host key
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Bootstrap application directory
        run: |
          set -eu
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' bash -se" <<'REMOTE'
          set -Eeuo pipefail
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/hsdarestani/apluscard.git
          else
            git remote set-url origin https://github.com/hsdarestani/apluscard.git
          fi
          REMOTE

      - name: Deploy and verify
        run: |
          set -eu
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' bash -se" <<'REMOTE'
          set -Eeuo pipefail
          cd "$APP_DIR"

          git fetch --prune origin main
          git checkout -B main origin/main
          git reset --hard origin/main

          if [ ! -f .env ]; then
            DJANGO_KEY="$(openssl rand -hex 48)"
            DB_PASSWORD="$(openssl rand -hex 24)"

            cat > .env <<EOF
          DJANGO_SECRET_KEY=$DJANGO_KEY
          DJANGO_DEBUG=0
          DJANGO_ALLOWED_HOSTS=cards.smarbiz.sbs,91.107.145.196,localhost,127.0.0.1
          DJANGO_CSRF_TRUSTED_ORIGINS=https://cards.smarbiz.sbs
          DJANGO_TIME_ZONE=Europe/Berlin
          DJANGO_SECURE_COOKIES=1
          DJANGO_HSTS_SECONDS=0
          DATABASE_URL=postgresql://apluscard:$DB_PASSWORD@db:5432/apluscard
          POSTGRES_DB=apluscard
          POSTGRES_USER=apluscard
          POSTGRES_PASSWORD=$DB_PASSWORD
          EOF
            chmod 600 .env
            echo "Created production environment file."
          fi

          docker compose up -d --build --remove-orphans

          healthy=0
          for attempt in $(seq 1 45); do
            if curl --fail --silent --show-error http://127.0.0.1:8010/health/ >/dev/null; then
              healthy=1
              break
            fi
            sleep 2
          done

          if [ "$healthy" -ne 1 ]; then
            echo "Application health check failed."
            docker compose ps
            docker compose logs --tail=200 web
            exit 1
          fi

          if [ ! -f .initial-credentials ]; then
            cat > .initial-credentials <<EOF
          INITIAL_OWNER_USERNAME=owner
          INITIAL_OWNER_PASSWORD=$(openssl rand -hex 12)
          INITIAL_STAFF_USERNAME=staff
          INITIAL_STAFF_PASSWORD=$(openssl rand -hex 12)
          INITIAL_CUSTOMER_USERNAME=customer
          INITIAL_CUSTOMER_PASSWORD=$(openssl rand -hex 12)
          EOF
            chmod 600 .initial-credentials
          fi

          set -a
          . ./.initial-credentials
          set +a

          docker compose exec -T \
            -e INITIAL_OWNER_USERNAME="$INITIAL_OWNER_USERNAME" \
            -e INITIAL_OWNER_PASSWORD="$INITIAL_OWNER_PASSWORD" \
            -e INITIAL_STAFF_USERNAME="$INITIAL_STAFF_USERNAME" \
            -e INITIAL_STAFF_PASSWORD="$INITIAL_STAFF_PASSWORD" \
            -e INITIAL_CUSTOMER_USERNAME="$INITIAL_CUSTOMER_USERNAME" \
            -e INITIAL_CUSTOMER_PASSWORD="$INITIAL_CUSTOMER_PASSWORD" \
            web python manage.py bootstrap_production

          cp deploy/nginx/cards.smarbiz.sbs.conf /etc/nginx/sites-available/cards.smarbiz.sbs
          ln -sfn /etc/nginx/sites-available/cards.smarbiz.sbs /etc/nginx/sites-enabled/cards.smarbiz.sbs
          nginx -t
          systemctl reload nginx

          curl --fail --silent --show-error \
            -H 'Host: cards.smarbiz.sbs' \
            http://127.0.0.1/health/ >/dev/null

          if getent ahostsv4 cards.smarbiz.sbs | awk '{print $1}' | grep -qx '91.107.145.196'; then
            if [ ! -d /etc/letsencrypt/live/cards.smarbiz.sbs ]; then
              certbot --nginx \
                --domain cards.smarbiz.sbs \
                --non-interactive \
                --agree-tos \
                --register-unsafely-without-email \
                --redirect || echo "SSL setup was skipped or failed; HTTP remains available."
            fi
          else
            echo "DNS is not pointing to 91.107.145.196 yet; SSL setup skipped."
          fi

          if [ -d /etc/letsencrypt/live/cards.smarbiz.sbs ]; then
            sed -i 's/^DJANGO_HSTS_SECONDS=.*/DJANGO_HSTS_SECONDS=31536000/' .env
            docker compose restart web
          fi

          echo "Deployment is healthy."
          docker compose ps
          REMOTE

      - name: Inspect production endpoint
        id: production
        if: success()
        run: |
          set -eu
          SCHEME="$(sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "if [ -d /etc/letsencrypt/live/cards.smarbiz.sbs ]; then echo https; else echo http; fi")"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Report deployment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const icon = status === 'success' ? '✅' : '❌';
            const scheme = '${{ steps.production.outputs.scheme }}' || 'http';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${icon} Production deployment **${status}**\n\n- Commit: \`${context.sha}\`\n- Site: ${scheme}://cards.smarbiz.sbs\n- Initial credentials: \`/root/apluscard/.initial-credentials\` on the server\n- Run: ${runUrl}\n- Time: ${new Date().toISOString()}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2,
              body,
            });
