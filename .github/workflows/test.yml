name: Test and Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: apluscard-production
  cancel-in-progress: false

jobs:
  django:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --noinput
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"
      - run: python manage.py test
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"

  deploy:
    name: Deploy to Hetzner
    needs: django
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: 91.107.145.196
      SSH_PORT: "22"
      SSH_USER: root
      APP_DIR: /root/apluscard
      SSHPASS: ${{ secrets.HETZNER_PASSWORD }}

    steps:
      - name: Validate deployment secret
        run: |
          set -eu
          test -n "$SSHPASS" || (echo "HETZNER_PASSWORD is missing" && exit 1)

      - name: Install SSH password client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Trust Hetzner host key
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Bootstrap application directory
        run: |
          set -eu
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' bash -se" <<'REMOTE'
          set -Eeuo pipefail
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/hsdarestani/apluscard.git
          else
            git remote set-url origin https://github.com/hsdarestani/apluscard.git
          fi
          REMOTE

      - name: Deploy and verify
        run: |
          set -eu
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' bash -se" <<'REMOTE'
          set -Eeuo pipefail
          cd "$APP_DIR"

          git fetch --prune origin main
          git checkout -B main origin/main
          git reset --hard origin/main

          if [ ! -f .env ]; then
            DJANGO_KEY="$(openssl rand -hex 48)"
            DB_PASSWORD="$(openssl rand -hex 24)"

            cat > .env <<EOF
          DJANGO_SECRET_KEY=$DJANGO_KEY
          DJANGO_DEBUG=0
          DJANGO_ALLOWED_HOSTS=cards.smarbiz.sbs,91.107.145.196,localhost,127.0.0.1
          DJANGO_CSRF_TRUSTED_ORIGINS=http://cards.smarbiz.sbs,https://cards.smarbiz.sbs
          DJANGO_TIME_ZONE=Europe/Berlin
          DJANGO_SECURE_COOKIES=0
          DJANGO_HSTS_SECONDS=0
          DEFAULT_BUSINESS_SLUG=shisha-bar
          DATABASE_URL=postgresql://apluscard:$DB_PASSWORD@db:5432/apluscard
          POSTGRES_DB=apluscard
          POSTGRES_USER=apluscard
          POSTGRES_PASSWORD=$DB_PASSWORD
          EOF
            chmod 600 .env
            echo "Created production environment file."
          fi

          if grep -q '^DJANGO_CSRF_TRUSTED_ORIGINS=' .env; then
            sed -i 's|^DJANGO_CSRF_TRUSTED_ORIGINS=.*|DJANGO_CSRF_TRUSTED_ORIGINS=http://cards.smarbiz.sbs,https://cards.smarbiz.sbs|' .env
          else
            echo 'DJANGO_CSRF_TRUSTED_ORIGINS=http://cards.smarbiz.sbs,https://cards.smarbiz.sbs' >> .env
          fi

          if grep -q '^DEFAULT_BUSINESS_SLUG=' .env; then
            sed -i 's/^DEFAULT_BUSINESS_SLUG=.*/DEFAULT_BUSINESS_SLUG=shisha-bar/' .env
          else
            echo 'DEFAULT_BUSINESS_SLUG=shisha-bar' >> .env
          fi

          if [ -d /etc/letsencrypt/live/cards.smarbiz.sbs ]; then
            sed -i 's/^DJANGO_SECURE_COOKIES=.*/DJANGO_SECURE_COOKIES=1/' .env
            sed -i 's/^DJANGO_HSTS_SECONDS=.*/DJANGO_HSTS_SECONDS=31536000/' .env
          else
            sed -i 's/^DJANGO_SECURE_COOKIES=.*/DJANGO_SECURE_COOKIES=0/' .env
            sed -i 's/^DJANGO_HSTS_SECONDS=.*/DJANGO_HSTS_SECONDS=0/' .env
          fi

          docker compose up -d --build --remove-orphans

          healthy=0
          for attempt in $(seq 1 45); do
            if curl --fail --silent --show-error http://127.0.0.1:8010/health/ >/dev/null; then
              healthy=1
              break
            fi
            sleep 2
          done

          if [ "$healthy" -ne 1 ]; then
            echo "Application health check failed."
            docker compose ps
            docker compose logs --tail=200 web
            exit 1
          fi

          if [ ! -f .initial-credentials ]; then
            cat > .initial-credentials <<EOF
          INITIAL_OWNER_USERNAME=owner
          INITIAL_OWNER_PASSWORD=$(openssl rand -hex 12)
          INITIAL_STAFF_USERNAME=staff
          INITIAL_STAFF_PASSWORD=$(openssl rand -hex 12)
          INITIAL_CUSTOMER_USERNAME=customer
          INITIAL_CUSTOMER_PASSWORD=$(openssl rand -hex 12)
          EOF
            chmod 600 .initial-credentials
          fi

          set -a
          . ./.initial-credentials
          set +a

          docker compose exec -T \
            -e INITIAL_OWNER_USERNAME="$INITIAL_OWNER_USERNAME" \
            -e INITIAL_OWNER_PASSWORD="$INITIAL_OWNER_PASSWORD" \
            -e INITIAL_STAFF_USERNAME="$INITIAL_STAFF_USERNAME" \
            -e INITIAL_STAFF_PASSWORD="$INITIAL_STAFF_PASSWORD" \
            -e INITIAL_CUSTOMER_USERNAME="$INITIAL_CUSTOMER_USERNAME" \
            -e INITIAL_CUSTOMER_PASSWORD="$INITIAL_CUSTOMER_PASSWORD" \
            web python manage.py bootstrap_production

          cp deploy/nginx/cards.smarbiz.sbs.conf /etc/nginx/sites-available/cards.smarbiz.sbs
          ln -sfn /etc/nginx/sites-available/cards.smarbiz.sbs /etc/nginx/sites-enabled/cards.smarbiz.sbs
          nginx -t
          systemctl reload nginx

          curl --fail --silent --show-error \
            -H 'Host: cards.smarbiz.sbs' \
            http://127.0.0.1/health/ >/dev/null

          if [ ! -d /etc/letsencrypt/live/cards.smarbiz.sbs ]; then
            certbot --nginx \
              --domain cards.smarbiz.sbs \
              --non-interactive \
              --agree-tos \
              --register-unsafely-without-email \
              --redirect || echo "SSL setup was skipped or failed; HTTP remains available."
          fi

          if [ -d /etc/letsencrypt/live/cards.smarbiz.sbs ]; then
            sed -i 's/^DJANGO_SECURE_COOKIES=.*/DJANGO_SECURE_COOKIES=1/' .env
            sed -i 's/^DJANGO_HSTS_SECONDS=.*/DJANGO_HSTS_SECONDS=31536000/' .env
            SITE_URL='https://cards.smarbiz.sbs'
          else
            sed -i 's/^DJANGO_SECURE_COOKIES=.*/DJANGO_SECURE_COOKIES=0/' .env
            sed -i 's/^DJANGO_HSTS_SECONDS=.*/DJANGO_HSTS_SECONDS=0/' .env
            SITE_URL='http://cards.smarbiz.sbs'
          fi
          docker compose restart web

          healthy=0
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8010/health/ >/dev/null; then
              healthy=1
              break
            fi
            sleep 2
          done
          test "$healthy" -eq 1 || (echo 'Application did not recover after restart.' && exit 1)

          COOKIE_JAR="$(mktemp)"
          LOGIN_HTML="$(mktemp)"
          LOGIN_HEADERS="$(mktemp)"
          SMOKE_USERNAME="deploy-smoke-$(date +%s)-$RANDOM"
          SMOKE_PASSWORD="$(openssl rand -hex 24)"

          cleanup() {
            rm -f "$COOKIE_JAR" "$LOGIN_HTML" "$LOGIN_HEADERS"
            docker compose exec -T -e SMOKE_USERNAME="$SMOKE_USERNAME" web python - <<'PY' >/dev/null 2>&1 || true
          import os
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "config.settings")
          import django
          django.setup()
          from django.contrib.auth import get_user_model
          get_user_model().objects.filter(username=os.environ["SMOKE_USERNAME"]).delete()
          PY
          }
          trap cleanup EXIT

          docker compose exec -T \
            -e SMOKE_USERNAME="$SMOKE_USERNAME" \
            -e SMOKE_PASSWORD="$SMOKE_PASSWORD" \
            web python - <<'PY'
          import os
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "config.settings")
          import django
          django.setup()
          from django.contrib.auth import get_user_model
          User = get_user_model()
          user, _ = User.objects.get_or_create(username=os.environ["SMOKE_USERNAME"])
          user.set_password(os.environ["SMOKE_PASSWORD"])
          user.save()
          PY

          curl --fail --silent --show-error -k \
            -c "$COOKIE_JAR" \
            "$SITE_URL/accounts/login/" > "$LOGIN_HTML"

          CSRF_TOKEN="$(awk '$6 == "csrftoken" {print $7}' "$COOKIE_JAR" | tail -n 1)"
          test -n "$CSRF_TOKEN" || (echo 'Login CSRF cookie was not issued.' && exit 1)

          LOGIN_STATUS="$(curl --silent --show-error -k \
            -o /dev/null \
            -D "$LOGIN_HEADERS" \
            -w '%{http_code}' \
            -b "$COOKIE_JAR" \
            -c "$COOKIE_JAR" \
            -e "$SITE_URL/accounts/login/" \
            --data-urlencode "username=$SMOKE_USERNAME" \
            --data-urlencode "password=$SMOKE_PASSWORD" \
            --data-urlencode "csrfmiddlewaretoken=$CSRF_TOKEN" \
            "$SITE_URL/accounts/login/")"

          test "$LOGIN_STATUS" = '302' || (echo "Login smoke test returned HTTP $LOGIN_STATUS" && exit 1)

          echo "Deployment, migrations, health check and login flow are healthy."
          docker compose ps
          REMOTE

      - name: Inspect production endpoint
        id: production
        if: success()
        run: |
          set -eu
          SCHEME="$(sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "if [ -d /etc/letsencrypt/live/cards.smarbiz.sbs ]; then echo https; else echo http; fi")"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Report deployment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const icon = status === 'success' ? '✅' : '❌';
            const scheme = '${{ steps.production.outputs.scheme }}' || 'http';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${icon} Production deployment **${status}**\n\n- Commit: \`${context.sha}\`\n- Site: ${scheme}://cards.smarbiz.sbs\n- Migration and login smoke test: ${status === 'success' ? 'passed' : 'failed'}\n- Run: ${runUrl}\n- Time: ${new Date().toISOString()}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2,
              body,
            });
