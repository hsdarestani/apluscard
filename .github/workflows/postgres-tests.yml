name: PostgreSQL-Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: apluscard_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d apluscard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/apluscard_test
      DJANGO_SECRET_KEY: postgres-ci-only-secret
      DJANGO_DEBUG: "1"
      DJANGO_SECURE_COOKIES: "0"
      DEFAULT_BUSINESS_SLUG: shisha-bar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Django-Systemprüfung
        run: python manage.py check
      - name: Fehlende Migrationen ausschließen
        run: python manage.py makemigrations --check --dry-run
      - name: Migrationen auf PostgreSQL anwenden
        run: python manage.py migrate --noinput
      - name: Gesamte Testsuite auf PostgreSQL ausführen
        run: python manage.py test
