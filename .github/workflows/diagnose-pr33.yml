name: Diagnose PR 33

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: apluscard_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d apluscard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/apluscard_test
      DJANGO_SECRET_KEY: pr33-diagnostic-only
      DJANGO_DEBUG: "0"
      DJANGO_SECURE_COOKIES: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Migrationen anwenden
        run: python manage.py migrate --noinput
      - name: Tests mit vollständigem PostgreSQL-Bericht ausführen
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python manage.py test --verbosity 2 2>&1 | tee pr33-postgres-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Diagnose-Ausgabe hochladen
        uses: actions/upload-artifact@v4
        with:
          name: pr33-postgres-output
          path: pr33-postgres-output.txt
          if-no-files-found: error
      - name: Teststatus übernehmen
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
