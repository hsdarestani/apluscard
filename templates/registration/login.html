{% extends 'cards/base.html' %}
{% block title %}Anmelden · A+ Card{% endblock %}
{% block content %}
<section class="auth-wrap"><div class="panel auth-panel"><span class="eyebrow">Willkommen zurück</span><h1>Anmelden</h1><p class="muted">Zugang für Kunden, Mitarbeiter und Manager.</p>{% if form.errors %}<div class="message error">Benutzername oder Passwort ist nicht korrekt.</div>{% endif %}<form method="post" class="stack-form">{% csrf_token %}<label>Benutzername<input type="text" name="username" autocomplete="username" autofocus required></label><label>Passwort<input type="password" name="password" autocomplete="current-password" required></label><button class="button primary full" type="submit">Anmelden</button></form></div></section>
{% endblock %}
